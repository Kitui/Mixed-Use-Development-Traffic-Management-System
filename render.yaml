services:
  - type: web
    name: mixed-use-development-traffic-management-system
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn estate_traffic.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: SEED_DEMO_DATA
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: mixed-use-traffic-db
          property: connectionString

databases:
  - name: mixed-use-traffic-db
    plan: free
